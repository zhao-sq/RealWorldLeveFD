defaults:
  - _self_
  - task: custom_pick_and_place

name: train_diffusion_unet_image
_target_: diffusion_policy.workspace.train_diffusion_unet_image_workspace.TrainDiffusionUnetImageWorkspace

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "default"

horizon: 16
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
past_action_visible: False
keypoint_visible_rate: 1.0
obs_as_global_cond: True

load_model_ckp: False
# ckp_path: /mnt/ssd1/szhao/LeveFD/ckp/2026.01.27/17.03.34_train_diffusion_unet_image_custom_pick_and_place/checkpoints/latest.ckpt
